name: ClawCloud Run Auto Login

on:
  schedule:
    # 你的原定计划：每 15 天的 00:00 (UTC 时间) 运行一次
    - cron: '35 3 */15 * *'
  # 允许在 GitHub 网页上手动点击运行按钮
  workflow_dispatch:

jobs:
  auto-login:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # 【更新】加入了 requests 用于推送，去掉了旧代码不需要的包
          pip install playwright pyotp playwright-stealth requests
          playwright install chromium
          # 【极其关键】安装 Ubuntu 服务器运行 Chromium 所需的底层依赖
          playwright install-deps chromium

      - name: Run Login Script
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PASSWORD: ${{ secrets.GH_PASSWORD }}
          GH_2FA_SECRET: ${{ secrets.GH_2FA_SECRET }}
          # 【新增】填入 PushPlus 的 Token
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python -u login_script.py
        
        run: python -u login_script.py
